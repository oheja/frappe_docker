      - /Users/rutilea/extaa/flower_stock:/home/frappe/frappe-bench/apps/flower_stock:cached

  scheduler:
    volumes:
      - /Users/rutilea/extaa/flower_stock:/home/frappe/frappe-bench/apps/flower_stock:cached

  websocket:
    volumes:
      - /Users/rutilea/extaa/flower_stock:/home/frappe/frappe-bench/apps/flower_stock:cached

